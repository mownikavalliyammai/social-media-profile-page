<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Profile App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <img src="profile.png" alt="Profile Photo" class="profile-pic">

        <h1 id="profileName">Heera</h1>
        <p id="profileUsername">heera_ds</p>
        <p id="profileBio">AI & DS Student | Learner | Dream Big ✨</p>

        <div class="stats">
    <div>
        <h3>12</h3>
        <p>Posts</p>
    </div>
    <div>
        <h3 id="followersCount">560</h3>
        <p>Followers</p>
    </div>
    <div>
        <h3>320</h3>
        <p>Following</p>
    </div>
</div>

        <div class="buttons">
            <button id="followBtn">Follow</button>
            <button id="editBtn">Edit Profile</button>
        </div>
    </div>
    <div class="posts-section">
    <h2>My Posts</h2>
    <div class="posts-grid">
        <div class="post-box">Post 1</div>
        <div class="post-box">Post 2</div>
        <div class="post-box">Post 3</div>
        <div class="post-box">Post 4</div>
        <div class="post-box">Post 5</div>
        <div class="post-box">Post 6</div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
